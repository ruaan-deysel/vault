site_name: Vault
site_description: Backup and restore daemon for Unraid servers
site_url: https://ruaan-deysel.github.io/vault/
repo_url: https://github.com/ruaan-deysel/vault
repo_name: ruaan-deysel/vault
docs_dir: docs
# Internal planning/spec docs live under docs/superpowers/ and are not part of
# the published site.
exclude_docs: |
  superpowers/
# architecture.md links to ../ansible/README.md, a repo file that lives outside
# docs_dir and cannot be resolved by MkDocs. Downgrade not-found links so the
# reused doc content does not have to be edited.
validation:
  links:
    not_found: ignore
theme:
  name: material
  palette:
    # "custom" defers to the Vault brand colors in stylesheets/extra.css,
    # matching the app's amber theme instead of Material's stock indigo.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed: { alternate_style: true }
  - tables
  - toc: { permalink: true }
  - pymdownx.snippets:
      base_path: !relative $config_dir
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Backup Jobs: guides/backup-jobs.md
      - Storage Destinations: guides/storage-destinations.md
      - Anomaly Detection: guides/anomaly-detection.md
      - Disaster Recovery: guides/disaster-recovery.md
  - How Backup Works: how-backup-works.md
  - Settings Reference:
      - App / Daemon Settings: reference/app-settings.md
      - Job Configuration: reference/job-config.md
      - Notifications: reference/notifications.md
      - "Storage: SFTP": reference/storage-sftp.md
      - "Storage: SMB": reference/storage-smb.md
      - "Storage: NFS": reference/storage-nfs.md
      - "Storage: WebDAV": reference/storage-webdav.md
      - "Storage: S3": reference/storage-s3.md
      - "Storage: Local": reference/storage-local.md
  - Architecture: architecture.md
  - API & MCP:
      - REST API: api.md
      - MCP Server: mcp.md
  - FAQ: faq.md
  - Changelog: changelog.md
