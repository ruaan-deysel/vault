name: "Vault CodeQL config"

# Files to skip during analysis. Grouped by reason so future edits stay
# coherent — don't drop unrelated paths into one bucket.
paths-ignore:
  # No Svelte exclusions are needed. Components (*.svelte) are never picked up
  # by the JavaScript extractor at all, and the *.svelte.js rune modules parse
  # normally — runes such as $state are ordinary call expressions to a parser.
  # The one file that did fail, web/src/lib/router.svelte.js, was fixed at
  # source rather than excluded: see the comment on its `import.meta.hot` read.

  # Build output and third-party code — not our source, scanning it
  # produces noisy alerts against upstream code we don't control.
  - "web/node_modules/**"
  - "web/dist/**"
  - "vendor/**"

  # Test fixtures and golden files — synthetic inputs that don't reflect
  # production code paths. Real test source (_test.go, *.test.ts, etc.)
  # stays in scope because tests can have genuine bugs.
  - "**/testdata/**"
  - "**/fixtures/**"

  # Non-Go, non-JS asset directories — CodeQL parses what it can find,
  # so excluding these avoids spurious YAML/Jinja warnings from the
  # JavaScript / Actions analysers.
  - "ansible/**"
  - "docs/**"
  - "scripts/**"
  - "plugin/**/*.php"
  - "plugin/**/*.css"
