name: "Vault CodeQL config"

# Files to skip during analysis. Grouped by reason so future edits stay
# coherent — don't drop unrelated paths into one bucket.
paths-ignore:
  # The HMR router is the one file CodeQL's JavaScript extractor cannot
  # parse. It uses `import.meta.hot` for Vite's hot-module cleanup, and the
  # extractor reports:
  #
  #   web/src/lib/router.svelte.js#L31: A parse error occurred:
  #   `Unexpected token`
  #
  # `import.meta` is module-only syntax the extractor does not accept here,
  # and it cannot be avoided without dropping HMR cleanup, so the single
  # file is excluded rather than the whole rune-module glob.
  #
  # Deliberately NOT excluded: the other *.svelte.js rune modules. Runes
  # such as $state and $derived are ordinary call expressions to a parser,
  # those files extract cleanly (confirmed in the extractor log), and they
  # hold real logic worth scanning.
  - "web/src/lib/router.svelte.js"

  # Build output and third-party code — not our source, scanning it
  # produces noisy alerts against upstream code we don't control.
  - "web/node_modules/**"
  - "web/dist/**"
  - "vendor/**"

  # Test fixtures and golden files — synthetic inputs that don't reflect
  # production code paths. Real test source (_test.go, *.test.ts, etc.)
  # stays in scope because tests can have genuine bugs.
  - "**/testdata/**"
  - "**/fixtures/**"

  # Non-Go, non-JS asset directories — CodeQL parses what it can find,
  # so excluding these avoids spurious YAML/Jinja warnings from the
  # JavaScript / Actions analysers.
  - "ansible/**"
  - "docs/**"
  - "scripts/**"
  - "plugin/**/*.php"
  - "plugin/**/*.css"
