name: "Vault CodeQL config"

# Exclude Svelte 5 rune modules (*.svelte.js / *.svelte.ts) from JavaScript /
# TypeScript analysis. Runes ($state, $derived, $effect, $props, …) are
# compile-time macros transformed by the Svelte compiler at build time; they
# are not valid plain JavaScript, so CodeQL's JS parser fails on them and
# reports a "Could not process some files due to syntax errors" warning
# (web/src/lib/router.svelte.js was the symptom). The Svelte compiler does
# the static analysis on these files during the Vite build, and the runtime
# output that ships to users is plain JS that CodeQL would happily parse —
# but at scan time the source is rune-flavoured. Excluding them keeps
# JavaScript scanning clean while still covering the rest of the SPA.
paths-ignore:
  - "web/src/**/*.svelte.js"
  - "web/src/**/*.svelte.ts"
  - "web/src/**/*.svelte"
  - "web/node_modules/**"
  - "web/dist/**"
