name: "Vault CodeQL config"

# Files to skip during analysis. Grouped by reason so future edits stay
# coherent — don't drop unrelated paths into one bucket.
paths-ignore:
  # Svelte components. A .svelte file is markup with an embedded <script>
  # block, so it is not valid JavaScript and CodeQL's parser fails on the
  # very first token, reporting "Could not process some files due to
  # syntax errors". Components are covered by the Svelte compiler during
  # the Vite build and by ESLint.
  #
  # Note: *.svelte.js / *.svelte.ts rune modules are deliberately NOT
  # excluded. Runes such as $state and $derived are ordinary call
  # expressions as far as a JS parser is concerned, so these files parse
  # fine — and they hold real logic worth scanning.
  - "web/src/**/*.svelte"

  # Build output and third-party code — not our source, scanning it
  # produces noisy alerts against upstream code we don't control.
  - "web/node_modules/**"
  - "web/dist/**"
  - "vendor/**"

  # Test fixtures and golden files — synthetic inputs that don't reflect
  # production code paths. Real test source (_test.go, *.test.ts, etc.)
  # stays in scope because tests can have genuine bugs.
  - "**/testdata/**"
  - "**/fixtures/**"

  # Non-Go, non-JS asset directories — CodeQL parses what it can find,
  # so excluding these avoids spurious YAML/Jinja warnings from the
  # JavaScript / Actions analysers.
  - "ansible/**"
  - "docs/**"
  - "scripts/**"
  - "plugin/**/*.php"
  - "plugin/**/*.css"
