name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v2026.03.00)"
        required: true
        type: string

permissions: {}

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CGO_ENABLED: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            VERSION=${TAG#v}
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (Tag: $TAG)"

          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify VERSION file matches tag
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '\n')

          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

          echo "VERSION file matches tag: $TAG_VERSION"

      - name: Download Go dependencies
        run: go mod download

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Run tests
        run: go test ./... -v

      - name: Build release package
        run: |
          echo "Building release package..."
          make package

          PACKAGE_FILE="build/vault-${{ steps.version.outputs.version }}.txz"
          if [ ! -f "$PACKAGE_FILE" ]; then
            echo "ERROR: Package file not found: $PACKAGE_FILE"
            ls -la build/
            exit 1
          fi

          echo "Package created: $PACKAGE_FILE"
          ls -lh "$PACKAGE_FILE"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="build/RELEASE_NOTES_BASE.md"

          if grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]" { capture = 1; next }
              capture && $0 ~ "^## \\[" { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES_FILE"

            python3 -c 'from pathlib import Path; import sys; path = Path(sys.argv[1]); text = path.read_text().strip(); path.write_text((text + "\n") if text else "")' "$NOTES_FILE"

            if [ ! -s "$NOTES_FILE" ]; then
              echo "No release notes content found for $VERSION in CHANGELOG.md"
              printf "See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for details.\n" "${{ github.repository }}" > "$NOTES_FILE"
            fi
          else
            echo "Version $VERSION not found in CHANGELOG.md"
            printf "See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for details.\n" "${{ github.repository }}" > "$NOTES_FILE"
          fi

          cp "$NOTES_FILE" build/RELEASE_NOTES.md

          echo "Release notes body:"
          cat build/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body_path: build/RELEASE_NOTES.md
          files: |
            build/vault-${{ steps.version.outputs.version }}.txz
          prerelease: ${{ steps.version.outputs.prerelease }}
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate GitHub-hosted SHA256 checksum
        id: checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          ASSET="vault-${VERSION}.txz"
          PACKAGE_FILE="/tmp/${ASSET}"

          rm -f "$PACKAGE_FILE"

          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$ASSET" --dir /tmp; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "ERROR: failed to download GitHub-hosted asset after $attempt attempts"
              exit 1
            fi

            echo "Asset not available yet, retrying in 5 seconds..."
            sleep 5
          done

          SHA256=$(sha256sum "$PACKAGE_FILE" | awk '{print $1}')

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "GitHub-hosted SHA256 checksum: $SHA256"

          printf "%s\n" "$SHA256" > build/SHA256SUM

      - name: Upload SHA256 checksum asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" build/SHA256SUM --clobber --repo "${{ github.repository }}"

      - name: Refresh release body with GitHub-hosted SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          {
            cat build/RELEASE_NOTES_BASE.md
            echo
            echo "---"
            echo
            echo "**SHA256 Checksum:**"
            echo '```'
            echo "${{ steps.checksum.outputs.sha256 }}  vault-${VERSION}.txz"
            echo '```'
          } > build/RELEASE_NOTES.md

          gh release edit "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --notes-file build/RELEASE_NOTES.md

      - name: Update PLG file for txz and SHA256
        run: |
          SHA256="${{ steps.checksum.outputs.sha256 }}"
          export SHA256

          echo "Updating PLG file with SHA256: $SHA256"
          python3 - <<'PY'
          from pathlib import Path; import os, re
          path = Path("plugin/vault.plg"); text = path.read_text()
          text = re.sub(r'<!ENTITY bundle\s+".*?">', '    <!ENTITY bundle    "&name;-&version;.txz">', text)
          text = re.sub(r'<!ENTITY (?:md5|sha256)\s+".*?">', '    <!ENTITY sha256      "{}">' .format(os.environ["SHA256"]), text)
          text = re.sub(r'<(?:MD5|SHA256)>&(?:md5|sha256);</(?:MD5|SHA256)>', '    <SHA256>&sha256;</SHA256>', text)
          path.write_text(text)
          PY

          echo "Updated PLG file"
          grep "ENTITY bundle" plugin/vault.plg
          grep "ENTITY sha256" plugin/vault.plg

      - name: Commit and push PLG updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet plugin/vault.plg; then
            echo "No changes to PLG file"
          else
            git fetch origin main
            git checkout main
            git pull origin main

            SHA256="${{ steps.checksum.outputs.sha256 }}"
            export SHA256
          python3 <<'PY'
          from pathlib import Path; import os, re
          path = Path("plugin/vault.plg"); text = path.read_text()
          text = re.sub(r'<!ENTITY bundle\s+".*?">', '    <!ENTITY bundle    "&name;-&version;.txz">', text)
          text = re.sub(r'<!ENTITY (?:md5|sha256)\s+".*?">', '    <!ENTITY sha256      "{}">' .format(os.environ["SHA256"]), text)
          text = re.sub(r'<(?:MD5|SHA256)>&(?:md5|sha256);</(?:MD5|SHA256)>', '    <SHA256>&sha256;</SHA256>', text)
          path.write_text(text)
          PY

            git add plugin/vault.plg
            git commit -m "chore: update PLG SHA256 hash for v${{ steps.version.outputs.version }} [skip ci]"
            git push origin main
            echo "Committed and pushed PLG updates"
          fi

      - name: Release Summary
        run: |
          echo "## v${{ steps.version.outputs.version }} Released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** vault-${{ steps.version.outputs.version }}.txz" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub-hosted SHA256:** ${{ steps.checksum.outputs.sha256 }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
