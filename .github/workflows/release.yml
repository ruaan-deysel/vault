name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./... -v

      - name: Build binary
        run: make build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: vault-linux-amd64
          generate_release_notes: true
