name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download Go dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Cross-compile Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION=$(cat VERSION)
          DATE=$(date '+%Y.%m.%d')
          HASH=$(git rev-parse --short HEAD)
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.buildDate=${DATE} -X main.commit=${HASH}" \
            -o build/vault-linux-amd64 ./cmd/vault/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/vault-linux-amd64
          generate_release_notes: true
