name: CodeQL

# Advanced setup rather than default setup: only advanced setup passes a
# config file to the init step, and .github/codeql/codeql-config.yml is what
# keeps .svelte components out of the JavaScript analysis. Under default setup
# that config is silently ignored and every scan reports "Could not process
# some files due to syntax errors".
#
# Switching repository settings to advanced setup is required for this workflow
# to run — while default setup is enabled it takes precedence.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so new queries are applied to code that has not changed.
    - cron: "0 3 * * 1"
  # Lets the first run be triggered by hand right after switching setup type,
  # instead of waiting for the next push.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Go has no build-mode "none"; autobuild compiles the module.
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        if: matrix.language == 'go'
        with:
          go-version: "1.26.5"

      # internal/release embeds CHANGELOG.md via //go:embed, and Go's embed
      # rules forbid parent-directory paths, so the repo-root copy must be in
      # place before autobuild compiles the package (same step as build.yml).
      - name: Copy CHANGELOG.md into embed location
        if: matrix.language == 'go'
        run: mkdir -p internal/release && cp CHANGELOG.md internal/release/CHANGELOG.md

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
