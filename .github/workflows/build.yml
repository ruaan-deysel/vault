name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Download Go dependencies
        run: go mod download

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Copy CHANGELOG.md into embed location
        # The `internal/release` package uses //go:embed CHANGELOG.md, but Go's
        # embed rules forbid parent-directory paths in the pattern, so the
        # repo-root CHANGELOG.md must be copied next to the directive before
        # any Go tool (linter, tests, build) sees the package. The Makefile
        # has this as a prerequisite on every relevant target; this workflow
        # invokes go/golangci-lint directly so it needs the copy step inline.
        # Mirror the canonical idiom from Makefile:65-67.
        run: mkdir -p internal/release && cp CHANGELOG.md internal/release/CHANGELOG.md

      - name: Run linter
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest
          args: --config .golangci.yml --max-issues-per-linter 0 --max-same-issues 0

      - name: Run tests
        run: go test ./... -v

      - name: Cross-compile Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION=$(cat VERSION)
          DATE=$(date '+%Y.%m.%d')
          HASH=$(git rev-parse --short HEAD)
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.buildDate=${DATE} -X main.commit=${HASH}" \
            -o build/vault-linux-amd64 ./cmd/vault/

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: vault-linux-amd64
          path: build/vault-linux-amd64
