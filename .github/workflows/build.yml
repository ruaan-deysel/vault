name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download Go dependencies
        run: go mod download

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --config .golangci.yml --max-issues-per-linter 0 --max-same-issues 0

      - name: Run tests
        run: go test ./... -v

      - name: Cross-compile Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION=$(cat VERSION)
          DATE=$(date '+%Y.%m.%d')
          HASH=$(git rev-parse --short HEAD)
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.buildDate=${DATE} -X main.commit=${HASH}" \
            -o build/vault-linux-amd64 ./cmd/vault/

      - name: Upload binary
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: vault-linux-amd64
          path: build/vault-linux-amd64
