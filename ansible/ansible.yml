---
# Vault Plugin — Build, Deploy, and Verify
#
# Structured as Ansible roles following the same patterns as unraid-management-agent.
# Variables defined in group_vars/all.yml.
#
# Usage:
#   ansible-playbook -i inventory.yml ansible.yml
#
# Tags:
#   --tags build      — Build plugin binary only
#   --tags deploy     — Deploy only (assumes binary exists)
#   --tags verify     — Run endpoint verification only
#   --tags uninstall  — Uninstall plugin completely
#   --tags redeploy   — Full lifecycle: uninstall → build → deploy → verify
#   --tags replica    — Deploy vault-replica Docker container
#   --skip-tags tests — Skip endpoint verification tests
#
# Extra vars:
#   -e create_backup=true — Backup config before uninstall
#
# Prerequisites:
#   brew install ansible sshpass   (macOS)
#   pip install ansible            (Linux)
#   cp inventory.yml.example inventory.yml

- name: Vault Plugin Deployment
  hosts: unraid
  gather_facts: false

  roles:
    - role: build
      tags: [build, redeploy]

    - role: uninstall
      tags: [uninstall, redeploy]

    - role: deploy
      tags: [deploy, redeploy]

    - role: verify
      tags: [verify, tests, redeploy]

    - role: replica
      tags: [replica]

  post_tasks:
    - name: Deployment and test summary
      tags: [always]
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════
          Vault Deployment & Test Summary
          ══════════════════════════════════════════

          Server:      {{ ansible_host }}
          Version:     {{ version }}

          ── Endpoints ──
          Browser UI:  /plugins/{{ plugin_name }}/include/app.php#/
          Proxy API:   /plugins/{{ plugin_name }}/include/proxy.php
          Daemon Bind: {{ daemon_bind_display | default(bind_address ~ ':' ~ api_port) }}

          {% if endpoint_results is defined %}
          ── Test Results ──
          Core endpoints:  {{ endpoint_results.results | selectattr('status', 'defined') | selectattr('status', 'eq', 200) | list | length }}/{{ endpoint_results.results | length }} passed
          CRUD operations: storage + job create/read/delete ✓
          WebSocket:       {{ ws_result.stdout | default('not tested') }}
          MCP:             {{ mcp_result.stdout | default('not tested') }}
          {% else %}
          ── Tests ──
          Use --tags verify to run endpoint tests
          {% endif %}
          ══════════════════════════════════════════
