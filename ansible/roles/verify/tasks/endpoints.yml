---
- name: Verify health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ api_port }}/api/v1/health"
    method: GET
    return_content: true
  register: health_response

- name: Assert health response
  ansible.builtin.assert:
    that:
      - health_response.status == 200
      - health_response.json.status == "ok"
      - health_response.json.version is defined
    success_msg: "Health endpoint OK - version {{ health_response.json.version }}"

