---
# Optional destructive VM restore/start smoke test.
#
# Runs only when verify_vm_restore_job_id and verify_vm_restore_item_name are
# provided by the inventory or extra vars. This lets us validate VM restore and
# post-restore start behaviour without forcing every verify run to replace a
# real VM.

- block:
    - name: Get VM smoke restore points
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ verify_vm_restore_job_id }}/restore-points"
        method: GET
        headers:
          X-API-Key: "{{ api_key | default('') }}"
        return_content: true
      register: vm_smoke_restore_points

    - name: Assert at least one VM restore point exists
      ansible.builtin.assert:
        that:
          - vm_smoke_restore_points.status == 200
          - vm_smoke_restore_points.json | length > 0
        success_msg: "VM smoke restore point found"

    - name: Trigger VM restore smoke test
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ verify_vm_restore_job_id }}/restore"
        method: POST
        headers:
          X-API-Key: "{{ api_key | default('') }}"
        body_format: json
        body:
          restore_point_id: "{{ vm_smoke_restore_points.json[0].id }}"
          item_name: "{{ verify_vm_restore_item_name }}"
          item_type: "vm"
        return_content: true
        status_code: [200, 202]

    - name: Poll until VM restore completes (up to 10 min)
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/runner/status"
        method: GET
        headers:
          X-API-Key: "{{ api_key | default('') }}"
        return_content: true
      register: vm_smoke_runner_status
      until: not vm_smoke_runner_status.json.active
      retries: 150
      delay: 4

    - name: Get VM smoke job history
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ verify_vm_restore_job_id }}/history"
        method: GET
        headers:
          X-API-Key: "{{ api_key | default('') }}"
        return_content: true
      register: vm_smoke_history

    - name: Collect VM smoke restore runs
      ansible.builtin.set_fact:
        vm_smoke_restore_runs: "{{ vm_smoke_history.json | selectattr('run_type', 'equalto', 'restore') | list }}"

    - name: Assert VM restore succeeded
      ansible.builtin.assert:
        that:
          - vm_smoke_restore_runs | length > 0
          - vm_smoke_restore_runs[0].status == 'completed'
        success_msg: "VM smoke restore completed successfully"
        fail_msg: "VM smoke restore failed: {{ (vm_smoke_restore_runs[0].log if (vm_smoke_restore_runs | length > 0) else 'no restore history available') }}"

    - name: Wait for restored VM to report running
      ansible.builtin.raw: "virsh domstate '{{ verify_vm_restore_item_name }}'"
      register: vm_smoke_state
      until: "'running' in (vm_smoke_state.stdout | lower)"
      retries: 30
      delay: 2
      changed_when: false

    - name: VM smoke test complete
      ansible.builtin.debug:
        msg: "VM restore/start smoke test passed for {{ verify_vm_restore_item_name }}"
