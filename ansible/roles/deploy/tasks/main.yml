---
# Deploy Vault plugin to Unraid
# Uses 'raw' module for remote tasks — Unraid has no Python interpreter
# File transfers use sshpass+scp delegated to localhost

- name: Deploy Vault plugin
  block:
    - name: Check server connectivity
      ansible.builtin.raw: echo "ok"
      changed_when: false

    - name: Stop existing service
      ansible.builtin.raw: "{{ rc_script }} stop 2>/dev/null; killall vault 2>/dev/null; true"
      register: stop_result
      changed_when: "'no process' not in stop_result.stdout | default('')"

    - name: Wait for service to stop
      ansible.builtin.pause:
        seconds: 2

    - name: Clean up stale USB files
      ansible.builtin.raw: >
        rm -rf {{ config_dir }}.bak.* {{ config_dir }}/vault.db.migrated 2>/dev/null; true
      changed_when: false

    - name: Create plugin directories
      ansible.builtin.raw: >
        mkdir -p
        {{ config_dir }}
        {{ plugin_dir }}
        {{ plugin_dir }}/include
        {{ plugin_dir }}/ui
      changed_when: true

    - name: Upload binary via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          -o ConnectTimeout=10
          {{ plugin_binary }}
          {{ ansible_user }}@{{ ansible_host }}:{{ binary_path }}
      register: scp_binary
      retries: 3
      delay: 3
      until: scp_binary.rc == 0
      changed_when: true

    - name: Set binary permissions
      ansible.builtin.raw: "chmod 0755 {{ binary_path }}"
      changed_when: true

    - name: Upload Vault page via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../plugin/pages/Vault.page
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/Vault.page
      changed_when: true

    - name: Clean up old sub-page files
      ansible.builtin.raw: >
        rm -f
        {{ plugin_dir }}/VaultJobs.page
        {{ plugin_dir }}/VaultRestore.page
        {{ plugin_dir }}/VaultStorage.page
        {{ plugin_dir }}/VaultHistory.page
        {{ plugin_dir }}/VaultSettings.page
        && rm -rf {{ plugin_dir }}/assets {{ plugin_dir }}/ui
      changed_when: true

    - name: Upload PHP includes via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../plugin/pages/include/api.php
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/include/api.php
      changed_when: true

    - name: Upload control.php via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../plugin/pages/include/control.php
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/include/control.php
      changed_when: true

    - name: Upload app.php via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../plugin/pages/include/app.php
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/include/app.php
      changed_when: true

    - name: Upload proxy.php via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../plugin/pages/include/proxy.php
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/include/proxy.php
      changed_when: true

    - name: Upload apply.sh via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../plugin/pages/include/apply.sh
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/include/apply.sh
      changed_when: true

    - name: Set apply.sh permissions
      ansible.builtin.raw: "chmod 0755 {{ plugin_dir }}/include/apply.sh"
      changed_when: true

    - name: Recreate proxied web UI directory
      ansible.builtin.raw: "mkdir -p {{ plugin_dir }}/ui"
      changed_when: true

    - name: Upload proxied web UI via SCP
      delegate_to: localhost
      ansible.builtin.command:
        cmd: >
          sshpass -p '{{ ansible_password }}'
          scp -r -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o PreferredAuthentications=password
          {{ playbook_dir }}/../web/dist/.
          {{ ansible_user }}@{{ ansible_host }}:{{ plugin_dir }}/ui/
      changed_when: true

    - name: Write plugin config file
      ansible.builtin.raw: |
        if [ ! -f {{ config_dir }}/vault.cfg ]; then
          cat > {{ config_dir }}/vault.cfg << 'CFGEOF'
        SERVICE="yes"
        PORT="{{ api_port }}"
        BIND_ADDRESS="{{ bind_address }}"
        CFGEOF
          chmod 0644 {{ config_dir }}/vault.cfg
        fi
      changed_when: true

    - name: Write RC script
      ansible.builtin.raw: |
        cat > {{ rc_script }} << 'RCEOF'
        #!/bin/bash
        DAEMON={{ binary_path }}
        PIDFILE={{ pid_file }}
        DB={{ db_path }}
        CONFIG={{ config_dir }}/vault.cfg
        LOG={{ log_path }}

        # Read config (PORT, BIND_ADDRESS, SERVICE).
        BIND_ADDRESS={{ bind_address }}
        PORT={{ api_port }}
        SERVICE=yes
        if [ -f "$CONFIG" ]; then
            source "$CONFIG"
        fi

        BIND_ADDRESS="${BIND_ADDRESS:-{{ bind_address }}}"
        PORT="${PORT:-{{ api_port }}}"
        LISTEN_HOST="$BIND_ADDRESS"
        if [[ "$LISTEN_HOST" == *:* && "$LISTEN_HOST" != \[* ]]; then
          LISTEN_HOST="[$LISTEN_HOST]"
        fi
        ADDR="${LISTEN_HOST}:$PORT"

        start() {
            if [ -f "$PIDFILE" ] && kill -0 $(cat "$PIDFILE") 2>/dev/null; then
                echo "Vault daemon is already running"
                return 1
            fi
          echo "Starting Vault daemon on $ADDR..."
            nohup $DAEMON daemon --db="$DB" --addr="$ADDR" >> "$LOG" 2>&1 &
            echo $! > "$PIDFILE"
          sleep 1
          if ! kill -0 $(cat "$PIDFILE") 2>/dev/null; then
            echo "Vault daemon failed to start. Check $LOG"
            rm -f "$PIDFILE"
            return 1
          fi
            echo "Vault daemon started (PID: $(cat $PIDFILE))"
        }

        stop() {
            if [ -f "$PIDFILE" ]; then
                echo "Stopping Vault daemon..."
                kill $(cat "$PIDFILE") 2>/dev/null
                rm -f "$PIDFILE"
                echo "Vault daemon stopped"
            else
                echo "Vault daemon is not running"
            fi
        }

        status() {
            if [ -f "$PIDFILE" ] && kill -0 $(cat "$PIDFILE") 2>/dev/null; then
            echo "Vault daemon is running (PID: $(cat $PIDFILE)) on $ADDR"
            else
                echo "Vault daemon is not running"
            fi
        }

        case "$1" in
            start)   start ;;
            stop)    stop ;;
            restart) stop; sleep 1; start ;;
            status)  status ;;
            *)       echo "Usage: $0 {start|stop|restart|status}" ;;
        esac
        RCEOF
        chmod 0755 {{ rc_script }}
      changed_when: true

    - name: Start Vault daemon
      ansible.builtin.raw: "{{ rc_script }} start"
      changed_when: true

    - name: Wait for API to be ready
      ansible.builtin.raw: |
        if [ -f {{ config_dir }}/vault.cfg ]; then
          # shellcheck source=/dev/null
          . {{ config_dir }}/vault.cfg
        fi
        TARGET="${BIND_ADDRESS:-{{ bind_address }}}"
        PORT_VALUE="${PORT:-{{ api_port }}}"
        if [ "$TARGET" = "0.0.0.0" ] || [ "$TARGET" = "::" ]; then
          TARGET="127.0.0.1"
        fi
        URL_HOST="$TARGET"
        if [[ "$URL_HOST" == *:* && "$URL_HOST" != \[* ]]; then
          URL_HOST="[$URL_HOST]"
        fi
        curl -fsS "http://${URL_HOST}:${PORT_VALUE}/api/v1/health" >/dev/null
      register: health_check
      retries: 10
      delay: 2
      until: health_check.rc == 0
      changed_when: false

    - name: Read effective daemon bind
      ansible.builtin.raw: |
        if [ -f {{ config_dir }}/vault.cfg ]; then
          # shellcheck source=/dev/null
          . {{ config_dir }}/vault.cfg
        fi
        BIND_VALUE="${BIND_ADDRESS:-{{ bind_address }}}"
        PORT_VALUE="${PORT:-{{ api_port }}}"
        echo "${BIND_VALUE}:${PORT_VALUE}"
      register: daemon_bind_info
      changed_when: false

    - name: Show service status
      ansible.builtin.raw: "pidof vault"
      register: pid_result
      changed_when: false

    - name: Report deployment
      ansible.builtin.debug:
        msg: "Vault v{{ version }} deployed (PID: {{ pid_result.stdout | trim }}) — daemon bind {{ daemon_bind_info.stdout | trim }}, UI via /plugins/{{ plugin_name }}/include/app.php#/"

  rescue:
    - name: Deploy failed — collect logs
      ansible.builtin.raw: "tail -50 {{ log_path }} 2>/dev/null || echo 'No logs available'"
      register: vault_logs
      ignore_errors: true
      changed_when: false

    - name: Display error logs
      ansible.builtin.debug:
        msg: "{{ vault_logs.stdout_lines | default(['No logs available']) }}"

    - name: Deploy failed — ensure service is stopped
      ansible.builtin.raw: "killall -9 vault 2>/dev/null; true"
      changed_when: false

    - name: Fail with deployment error
      ansible.builtin.fail:
        msg: "Vault deployment failed. Check logs above."
