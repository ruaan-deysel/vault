---
# Deploy MinIO container and create the test bucket.
#
# Image versions are referenced via test_minio_image / test_mc_image
# (defaults in defaults/main.yml). Pin to a specific RELEASE.* tag in
# inventory or with -e for reproducible CI runs.
#
# Tasks targeting the Unraid host use ansible.builtin.raw because Unraid
# does not ship a Python interpreter usable by Ansible's regular modules.

- name: Check Docker is available
  ansible.builtin.raw: docker info > /dev/null 2>&1 && echo OK || echo FAIL
  register: cs_docker_check
  changed_when: false

- name: Assert Docker is available
  ansible.builtin.assert:
    that: "'OK' in cs_docker_check.stdout"
    fail_msg: "Docker is not available on the target host"

- name: Remove existing MinIO container
  ansible.builtin.raw: |
    out=$(docker rm -f {{ test_minio_container | quote }} 2>/dev/null || true)
    if [ -n "$out" ]; then echo REMOVED; fi
  register: cs_minio_rm
  changed_when: "'REMOVED' in cs_minio_rm.stdout"

- name: Ensure MinIO data directory exists
  ansible.builtin.raw: |
    if [ ! -d {{ test_minio_data_dir | quote }} ]; then
      mkdir -p {{ test_minio_data_dir | quote }}
      echo CREATED
    fi
  register: cs_minio_mkdir
  changed_when: "'CREATED' in cs_minio_mkdir.stdout"

- name: Pull MinIO image
  ansible.builtin.raw: docker pull {{ test_minio_image | quote }}
  changed_when: false

- name: Start MinIO container
  # Credentials are passed via the parent shell's environment so they never
  # appear in `docker run`'s argv (and therefore not in `ps` output of the
  # docker daemon's child processes). They still pass through Ansible's
  # raw command — no_log keeps them out of the playbook log.
  ansible.builtin.raw: |
    MINIO_ROOT_USER={{ test_minio_root_user | quote }} \
    MINIO_ROOT_PASSWORD={{ test_minio_root_password | quote }} \
    docker run -d \
      --name {{ test_minio_container | quote }} \
      --restart unless-stopped \
      -p {{ test_minio_api_port | quote }}:9000 \
      -p {{ test_minio_console_port | quote }}:9001 \
      -v {{ test_minio_data_dir | quote }}:/data \
      -e MINIO_ROOT_USER \
      -e MINIO_ROOT_PASSWORD \
      {{ test_minio_image | quote }} \
      server /data --console-address ":9001"
  changed_when: true
  no_log: true

- name: Wait for MinIO API to respond
  ansible.builtin.raw: |
    for i in $(seq 1 60); do
      if curl --max-time 5 --connect-timeout 3 -fsS \
           "http://127.0.0.1:{{ test_minio_api_port }}/minio/health/ready" \
           >/dev/null 2>&1; then
        echo READY
        exit 0
      fi
      sleep 2
    done
    echo TIMEOUT
    exit 1
  register: cs_minio_ready
  changed_when: false
  failed_when: "'READY' not in cs_minio_ready.stdout"

- name: Pull mc (MinIO client) image
  ansible.builtin.raw: docker pull {{ test_mc_image | quote }}
  changed_when: false

- name: Create MinIO bucket via mc (idempotent)
  # Same env-var pattern as the MinIO start task: credentials enter the
  # mc container via -e <NAME> (no =VALUE in argv) and the bucket name is
  # quoted. no_log prevents Ansible from echoing the expansion.
  ansible.builtin.raw: |
    MC_HOST_ALIAS="http://127.0.0.1:{{ test_minio_api_port }}" \
    MC_USER={{ test_minio_root_user | quote }} \
    MC_PASS={{ test_minio_root_password | quote }} \
    MC_BUCKET={{ test_minio_bucket | quote }} \
    docker run --rm --entrypoint sh --network=host \
      -e MC_HOST_ALIAS -e MC_USER -e MC_PASS -e MC_BUCKET \
      {{ test_mc_image | quote }} -c \
      'mc alias set local "$MC_HOST_ALIAS" "$MC_USER" "$MC_PASS" \
        && mc mb --ignore-existing "local/$MC_BUCKET" \
        && echo BUCKET_OK'
  register: cs_minio_bucket
  changed_when: "'Bucket created successfully' in cs_minio_bucket.stdout"
  failed_when: "'BUCKET_OK' not in cs_minio_bucket.stdout"
  no_log: true

- name: MinIO ready
  ansible.builtin.debug:
    msg: "MinIO running on {{ ansible_host }}:{{ test_minio_api_port }} (bucket: {{ test_minio_bucket }})"
