---
# End-to-end backup + restore against the WebDAV test container.

- name: Set WebDAV smoke status to running
  ansible.builtin.set_fact:
    webdav_smoke_status: "running"

- name: WebDAV smoke test
  block:
    - name: Assert API key is configured
      delegate_to: localhost
      ansible.builtin.assert:
        that:
          - api_key is defined
          - api_key | length > 0
        fail_msg: "api_key must be set (e.g. -e api_key=...) to call the Vault API"

    - name: Create source folder on Unraid (WebDAV)
      ansible.builtin.raw: |
        rm -rf /tmp/vault-cs-wd-src /tmp/vault-cs-wd-restore
        mkdir -p /tmp/vault-cs-wd-src /tmp/vault-cs-wd-restore
        echo 'vault-webdav-test-content-{{ ansible_date_time.iso8601 | default("now") }}' > /tmp/vault-cs-wd-src/payload.txt

    - name: Register WebDAV storage destination in Vault
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/storage"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        body_format: json
        body:
          name: "test-cloud-webdav"
          type: "webdav"
          config: >-
            {{ {
              'url': 'http://127.0.0.1:' ~ test_webdav_port ~ '/',
              'username': test_webdav_username,
              'password': test_webdav_password,
              'base_path': 'vault-smoke',
              'insecure_skip_verify': false
            } | to_json }}
        status_code: 201
        return_content: true
      register: cs_wd_storage
      no_log: true

    - name: Test WebDAV connection
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/storage/{{ cs_wd_storage.json.id }}/test"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: 200
        return_content: true
      register: cs_wd_test

    - name: Assert WebDAV connection ok
      ansible.builtin.assert:
        that:
          - cs_wd_test.status == 200
          - cs_wd_test.json.success | bool
        success_msg: "WebDAV TestConnection succeeded"
        fail_msg: "WebDAV TestConnection failed: {{ cs_wd_test.json.error | default('unknown') }}"

    - name: Create folder backup job (WebDAV)
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        body_format: json
        body:
          name: "test-cloud-webdav-job"
          description: "Cloud-storage WebDAV smoke test"
          enabled: false
          schedule: ""
          backup_type_chain: "full"
          retention_count: 1
          retention_days: 1
          compression: "zstd"
          notify_on: "failure"
          storage_dest_id: "{{ cs_wd_storage.json.id }}"
          items:
            - item_type: "folder"
              item_name: "vault-cs-wd-src"
              item_id: "/tmp/vault-cs-wd-src"
              settings: '{"path":"/tmp/vault-cs-wd-src","preset":""}'
        status_code: 201
        return_content: true
      register: cs_wd_job

    - name: Trigger WebDAV backup run
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_wd_job.json.id }}/run"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: [200, 202]

    - name: Poll until WebDAV backup completes
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/runner/status"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_wd_runner
      until: not cs_wd_runner.json.active
      retries: 60
      delay: 2

    - name: Get WebDAV job history
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_wd_job.json.id }}/history"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_wd_history

    - name: Assert WebDAV backup succeeded
      ansible.builtin.assert:
        that:
          - cs_wd_history.json | length > 0
          - (cs_wd_history.json | length > 0) and (cs_wd_history.json[0].status == 'completed')
        success_msg: "WebDAV backup completed"
        fail_msg: "WebDAV backup failed: {{ (cs_wd_history.json[0].log | default('no log available')) if (cs_wd_history.json | length > 0) else 'no history' }}"

    - name: Get WebDAV restore points
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_wd_job.json.id }}/restore-points"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_wd_rps

    - name: Assert WebDAV restore point exists
      ansible.builtin.assert:
        that:
          - cs_wd_rps.json | length > 0

    - name: Trigger WebDAV restore
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_wd_job.json.id }}/restore"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        body_format: json
        body:
          restore_point_id: "{{ cs_wd_rps.json[0].id }}"
          destination: "/tmp/vault-cs-wd-restore"
        status_code: [200, 202]

    - name: Poll until WebDAV restore completes
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/runner/status"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_wd_runner_r
      until: not cs_wd_runner_r.json.active
      retries: 60
      delay: 2

    - name: Read restored WebDAV file
      ansible.builtin.raw: |
        f=$(find /tmp/vault-cs-wd-restore -name 'payload.txt' | head -1)
        if [ -z "$f" ]; then
          echo "NO_PAYLOAD_FOUND" >&2
          exit 1
        fi
        cat "$f"
      register: cs_wd_restored
      changed_when: false

    - name: Assert restored content matches
      ansible.builtin.assert:
        that:
          - "'vault-webdav-test-content' in cs_wd_restored.stdout"
        success_msg: "WebDAV restored content verified"
        fail_msg: "WebDAV restored content mismatch: {{ cs_wd_restored.stdout }}"

    - name: Mark WebDAV smoke status passed
      ansible.builtin.set_fact:
        webdav_smoke_status: "PASSED ✓"
  rescue:
    - name: Mark WebDAV smoke status failed
      ansible.builtin.set_fact:
        webdav_smoke_status: "FAILED ✗"
    - name: Re-raise WebDAV smoke failure
      ansible.builtin.fail:
        msg: "WebDAV smoke test failed"
  always:
    - name: Cleanup WebDAV job
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_wd_job.json.id }}?deleteFiles=true"
        method: DELETE
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: [204, 404]
      when: cs_wd_job is defined and cs_wd_job.json is defined and cs_wd_job.json.id is defined
      ignore_errors: true

    - name: Cleanup WebDAV storage
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/storage/{{ cs_wd_storage.json.id }}?deleteFiles=true"
        method: DELETE
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: [204, 404]
      when: cs_wd_storage is defined and cs_wd_storage.json is defined and cs_wd_storage.json.id is defined
      ignore_errors: true

    - name: Cleanup WebDAV source/restore folders
      ansible.builtin.raw: rm -rf /tmp/vault-cs-wd-src /tmp/vault-cs-wd-restore
      changed_when: false
      ignore_errors: true
