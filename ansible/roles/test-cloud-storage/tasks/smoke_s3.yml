---
# End-to-end backup + restore against the MinIO test container.

- name: Set S3 smoke status to running
  ansible.builtin.set_fact:
    s3_smoke_status: "running"

- name: S3 smoke test
  block:
    - name: Assert API key is configured
      delegate_to: localhost
      ansible.builtin.assert:
        that:
          - api_key is defined
          - (api_key) | length > 0
        fail_msg: "api_key must be set (e.g. -e api_key=...) to call the Vault API"

    - name: Create source folder on Unraid (S3)
      ansible.builtin.raw: |
        rm -rf /tmp/vault-cs-s3-src /tmp/vault-cs-s3-restore
        mkdir -p /tmp/vault-cs-s3-src /tmp/vault-cs-s3-restore
        echo 'vault-s3-test-content-{{ ansible_date_time.iso8601 | default("now") }}' > /tmp/vault-cs-s3-src/payload.txt

    - name: Register S3 storage destination in Vault
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/storage"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        body_format: json
        body:
          name: "test-cloud-s3"
          type: "s3"
          config: >-
            {{ {
              'bucket': test_minio_bucket,
              'region': 'us-east-1',
              'access_key': test_minio_root_user,
              'secret_key': test_minio_root_password,
              'endpoint': 'http://127.0.0.1:' ~ test_minio_api_port,
              'base_path': 'vault-smoke',
              'force_path_style': true
            } | to_json }}
        status_code: 201
        return_content: true
      register: cs_s3_storage
      no_log: true

    - name: Test S3 connection
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/storage/{{ cs_s3_storage.json.id }}/test"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: 200
        return_content: true
      register: cs_s3_test

    - name: Assert S3 connection ok
      ansible.builtin.assert:
        that:
          - cs_s3_test.status == 200
          - cs_s3_test.json.success | bool
        success_msg: "S3 TestConnection succeeded"
        fail_msg: "S3 TestConnection failed: {{ cs_s3_test.json.error | default('unknown') }}"

    - name: Create folder backup job (S3)
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        body_format: json
        # REGRESSION: job name and item name deliberately contain spaces.
        # The combination of aws-sdk-go-v2 + a custom EndpointResolverV2 +
        # path-style addressing has a signing-vs-sending URL-encoding
        # asymmetry: keys with reserved characters (space, etc.) are sent
        # as `%20` but the SigV4 canonical URI is computed from the raw
        # path, causing every PutObject + DeleteObject to fail with `403
        # SignatureDoesNotMatch` against MinIO 2025-09-07+, MEGA, IDrive
        # E2, and similar gateways. TestConnection (HeadBucket has no
        # path beyond the bucket) keeps passing — the "test passes,
        # uploads always fail" fingerprint. The S3 adapter's `keyFor()`
        # now sanitizes each path segment to the RFC 3986 unreserved
        # set; this fixture proves the sanitizer is active and that a
        # round-trip with reserved chars in the job/item name succeeds.
        # Do NOT replace these names with alphanumeric-only values
        # without re-testing against MinIO `RELEASE.2025-09-07T16-13-09Z`
        # or later — the earlier alphanumeric-only fixture passed for
        # months while the bug shipped to users.
        body:
          name: "QA S3 smoke (spaces)"
          description: "Cloud-storage S3 smoke test"
          enabled: false
          schedule: ""
          backup_type_chain: "full"
          retention_count: 1
          retention_days: 1
          compression: "zstd"
          notify_on: "failure"
          storage_dest_id: "{{ cs_s3_storage.json.id }}"
          items:
            - item_type: "folder"
              item_name: "src with spaces"
              item_id: "/tmp/vault-cs-s3-src"
              settings: '{"path":"/tmp/vault-cs-s3-src","preset":""}'
        status_code: 201
        return_content: true
      register: cs_s3_job

    - name: Trigger S3 backup run
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_s3_job.json.id }}/run"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: [200, 202]

    - name: Poll until S3 backup completes
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/runner/status"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_s3_runner
      until: not cs_s3_runner.json.active
      retries: 60
      delay: 2

    - name: Get S3 job history
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_s3_job.json.id }}/history"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_s3_history

    - name: Assert S3 backup succeeded
      ansible.builtin.assert:
        that:
          - cs_s3_history.json | length > 0
          - (cs_s3_history.json | length > 0) and (cs_s3_history.json[0].status == 'completed')
        success_msg: "S3 backup completed"
        fail_msg: "S3 backup failed: {{ (cs_s3_history.json[0].log | default('no log available')) if (cs_s3_history.json | length > 0) else 'no history' }}"

    - name: Get S3 restore points
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_s3_job.json.id }}/restore-points"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_s3_rps

    - name: Assert S3 restore point exists
      ansible.builtin.assert:
        that:
          - cs_s3_rps.json | length > 0

    - name: Trigger S3 restore
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_s3_job.json.id }}/restore"
        method: POST
        headers:
          X-API-Key: "{{ api_key }}"
        body_format: json
        body:
          restore_point_id: "{{ cs_s3_rps.json[0].id }}"
          # Item name matches the create-job step above — uses spaces
          # to exercise the key-sanitization round-trip end-to-end.
          items:
            - "src with spaces"
          destination: "/tmp/vault-cs-s3-restore"
        status_code: [200, 202]

    - name: Poll until S3 restore completes
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/runner/status"
        method: GET
        headers:
          X-API-Key: "{{ api_key }}"
        return_content: true
      register: cs_s3_runner_r
      until: not cs_s3_runner_r.json.active
      retries: 60
      delay: 2

    - name: Read restored S3 file
      ansible.builtin.raw: |
        f=$(find /tmp/vault-cs-s3-restore -name 'payload.txt' | head -1)
        if [ -z "$f" ]; then
          echo "NO_PAYLOAD_FOUND" >&2
          exit 1
        fi
        cat "$f"
      register: cs_s3_restored
      changed_when: false

    - name: Assert restored content matches
      ansible.builtin.assert:
        that:
          - "'vault-s3-test-content' in cs_s3_restored.stdout"
        success_msg: "S3 restored content verified"
        fail_msg: "S3 restored content mismatch: {{ cs_s3_restored.stdout }}"

    - name: Mark S3 smoke status passed
      ansible.builtin.set_fact:
        s3_smoke_status: "PASSED ✓"
  rescue:
    - name: Mark S3 smoke status failed
      ansible.builtin.set_fact:
        s3_smoke_status: "FAILED ✗"
    - name: Re-raise S3 smoke failure
      ansible.builtin.fail:
        msg: "S3 smoke test failed"
  always:
    - name: Cleanup S3 job
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/jobs/{{ cs_s3_job.json.id }}?deleteFiles=true"
        method: DELETE
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: [204, 404]
      when: cs_s3_job is defined and cs_s3_job.json is defined and cs_s3_job.json.id is defined
      ignore_errors: true

    - name: Cleanup S3 storage
      delegate_to: localhost
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ verify_local_port }}/api/v1/storage/{{ cs_s3_storage.json.id }}?deleteFiles=true"
        method: DELETE
        headers:
          X-API-Key: "{{ api_key }}"
        status_code: [204, 404]
      when: cs_s3_storage is defined and cs_s3_storage.json is defined and cs_s3_storage.json.id is defined
      ignore_errors: true

    - name: Cleanup S3 source/restore folders
      ansible.builtin.raw: rm -rf /tmp/vault-cs-s3-src /tmp/vault-cs-s3-restore
      changed_when: false
      ignore_errors: true
