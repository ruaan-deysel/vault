---
# Uninstall Vault plugin from Unraid
# Uses 'raw' module — Unraid has no Python interpreter

- name: Check server before uninstall
  ansible.builtin.raw: echo "ok"
  changed_when: false

- name: Check if Vault is installed
  ansible.builtin.raw: test -f {{ binary_path }} && echo "EXISTS" || echo "MISSING"
  register: plugin_check
  changed_when: false

- name: Stop Vault daemon via RC script
  ansible.builtin.raw: "{{ rc_script }} stop 2>/dev/null; true"
  changed_when: true
  ignore_errors: true

- name: Kill any vault process
  ansible.builtin.raw: "killall vault 2>/dev/null; true"
  changed_when: true

- name: Kill anything on API port
  ansible.builtin.raw: "fuser -k {{ api_port }}/tcp 2>/dev/null; true"
  changed_when: true

- name: Wait for service to stop
  ansible.builtin.pause:
    seconds: 3

- name: Verify process is stopped
  ansible.builtin.raw: "pidof vault 2>/dev/null && echo RUNNING || echo STOPPED"
  register: pid_after_stop
  changed_when: false

- name: Force kill if still running
  ansible.builtin.raw: "killall -9 vault 2>/dev/null; true"
  when: "'RUNNING' in pid_after_stop.stdout"
  changed_when: "'RUNNING' in pid_after_stop.stdout"

- name: Wait after force kill
  ansible.builtin.pause:
    seconds: 2
  when: "'RUNNING' in pid_after_stop.stdout"

- name: Verify API is unreachable after stop
  delegate_to: localhost
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ api_port }}/api/v1/health"
    method: GET
    status_code: 200
    timeout: 3
  register: api_after_stop
  failed_when: false
  changed_when: false

- name: Confirm API is down
  ansible.builtin.assert:
    that:
      - api_after_stop.status != 200
    fail_msg: "API is still responding after stop — PID may still be running"
    success_msg: "API confirmed unreachable after service stop"

- name: Backup config directory before removal
  ansible.builtin.raw: "cp -r {{ config_dir }} {{ config_dir }}.bak.$(date +%Y%m%dT%H%M%S) 2>/dev/null || true"
  when: create_backup
  changed_when: true

- name: Remove Vault files and directories
  ansible.builtin.raw: |
    rm -f {{ binary_path }}
    rm -f {{ rc_script }}
    rm -rf {{ plugin_dir }}
    rm -f {{ pid_file }}
    rm -f {{ log_path }}
  changed_when: true

- name: Remove config directory
  ansible.builtin.raw: "rm -rf {{ config_dir }}"
  when: not create_backup
  changed_when: true

- name: Verify plugin directory removed
  ansible.builtin.raw: "test -d {{ plugin_dir }} && echo EXISTS || echo REMOVED"
  register: dir_after_remove
  changed_when: false

- name: Confirm full uninstall
  ansible.builtin.assert:
    that:
      - "'REMOVED' in dir_after_remove.stdout"
    fail_msg: "Uninstall incomplete — plugin directory still exists"
    success_msg: "Plugin fully uninstalled (binary, config, and log removed)"

- name: Uninstall summary
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════
      Vault Plugin Uninstalled
      ══════════════════════════════════════
      Service:     stopped ✓
      Binary:      {{ binary_path }} removed ✓
      Plugin dir:  {{ plugin_dir }} removed ✓
      RC script:   {{ rc_script }} removed ✓
      Log file:    {{ log_path }} removed ✓
      API:         unreachable ✓
      ══════════════════════════════════════
