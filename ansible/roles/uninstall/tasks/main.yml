---
- name: Uninstall Vault plugin
  block:
    - name: Check if Vault is installed
      ansible.builtin.stat:
        path: "{{ binary_path }}"
      register: vault_binary

    - name: Stop Vault daemon
      ansible.builtin.command:
        cmd: "{{ rc_script }} stop"
      when: vault_binary.stat.exists
      ignore_errors: true
      changed_when: true

    - name: Force kill if still running
      ansible.builtin.shell:
        cmd: "killall vault 2>/dev/null || true"
      when: vault_binary.stat.exists
      changed_when: true

    - name: Wait for process to stop
      ansible.builtin.pause:
        seconds: 2
      when: vault_binary.stat.exists

    - name: Verify API is unreachable
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ api_port }}/api/v1/health"
        method: GET
      register: api_check
      failed_when: false
      changed_when: false

    - name: Assert API is down
      ansible.builtin.assert:
        that: api_check.status != 200
        fail_msg: "Vault API is still responding after stop"
        success_msg: "Vault API confirmed unreachable"
      when: vault_binary.stat.exists

    - name: Remove binary
      ansible.builtin.file:
        path: "{{ binary_path }}"
        state: absent

    - name: Remove RC script
      ansible.builtin.file:
        path: "{{ rc_script }}"
        state: absent

    - name: Remove plugin directory
      ansible.builtin.file:
        path: "{{ plugin_dir }}"
        state: absent

    - name: Remove PID file
      ansible.builtin.file:
        path: "{{ pid_file }}"
        state: absent

    - name: Remove log file
      ansible.builtin.file:
        path: "{{ log_path }}"
        state: absent

    - name: Remove config directory (optional)
      ansible.builtin.file:
        path: "{{ config_dir }}"
        state: absent
      when: not create_backup

    - name: Backup config directory before removal
      ansible.builtin.command:
        cmd: "cp -r {{ config_dir }} {{ config_dir }}.bak.{{ ansible_date_time.iso8601_basic_short | default('backup') }}"
      when: create_backup
      ignore_errors: true
      changed_when: true

    - name: Display uninstall status
      ansible.builtin.debug:
        msg: "Vault plugin uninstalled successfully"
