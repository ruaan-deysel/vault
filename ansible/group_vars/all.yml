plugin_name: vault
version: "{{ lookup('file', playbook_dir + '/../VERSION') }}"
build_dir: "{{ playbook_dir }}/../build"
plugin_binary: "{{ build_dir }}/vault-linux-amd64"
plugin_dir: "/usr/local/emhttp/plugins/{{ plugin_name }}"
config_dir: "/boot/config/plugins/{{ plugin_name }}"
binary_path: "/usr/local/sbin/vault"
rc_script: "/etc/rc.d/rc.vault"
api_port: "{{ hostvars[inventory_hostname].api_port | default(24085) }}"
bind_address: "{{ hostvars[inventory_hostname].bind_address | default('127.0.0.1') }}"
verify_local_port: "{{ hostvars[inventory_hostname].verify_local_port | default(42485) }}"
db_path: "{{ config_dir }}/vault.db"
log_path: "/var/log/vault.log"
pid_file: "/var/run/vault.pid"
create_backup: false

# Vault Replica container
replica_port: "{{ hostvars[inventory_hostname].replica_port | default(24086) }}"
replica_data_dir: /mnt/cache/appdata/vault-replica
replica_storage_dir: /mnt/user/backups/vault-replica
timezone: Australia/Sydney

# Cloud-storage test containers (S3 + WebDAV smoke tests)
test_minio_container: vault-test-minio
# Ports are deliberately outside the well-known Prometheus exporter range
# (9100/9101 collide with node_exporter/HAProxy exporter on Unraid hosts).
test_minio_api_port: 19100
test_minio_console_port: 19101
test_minio_root_user: vaultadmin
test_minio_root_password: "vaultadmin-test-only"
test_minio_bucket: vault-test
test_minio_data_dir: /mnt/cache/appdata/vault-test-minio

test_webdav_container: vault-test-webdav
test_webdav_port: 8082
test_webdav_username: vault
test_webdav_password: "vault-webdav-test-only"
test_webdav_data_dir: /mnt/cache/appdata/vault-test-webdav
